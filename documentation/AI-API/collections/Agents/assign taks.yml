info:
  name: assign taks
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/agents/tasks/assign/stream
  headers:
    - name: Accept
      value: text/event-stream
    - name: Cache-Control
      value: no-cache
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
