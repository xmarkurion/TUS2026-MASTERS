info:
  name: Generate Tasks from Epic
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/agents/tasks/generate
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "epicDescription": "Design and implement a complete user authentication and account management system for the application. The system should allow users to securely register, log in, and manage their account details while ensuring high standards of security, usability, and performance.The registration process must include validation for email format, password strength, and duplicate account detection. Passwords should be securely hashed before storage. Upon successful registration, users should be able to log in using their credentials.The login system should authenticate users and generate a secure token (e.g., JWT) to manage sessions. Proper error handling must be implemented for invalid credentials, expired sessions, and unauthorized access attempts.The frontend should provide intuitive and responsive user interfaces for registration and login, including form validation, error messages, and loading states. Accessibility and responsive design principles must be followed.Additionally, the system should include protected routes that only authenticated users can access. Middleware should be implemented to validate tokens and enforce authorization rules.Comprehensive testing must be carried out, including unit tests for backend logic, integration tests for authentication flows, and UI tests for frontend interactions."
      }
  auth: inherit

runtime:
  variables:
    - name: baseurl
      value: http://localhost:8080/tasks/agents

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
