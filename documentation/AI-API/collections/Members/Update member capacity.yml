info:
  name: Update member capacity
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:8080/members/updatecapacity/{{id}}
  body:
    type: json
    data: |-
      {
          "availableCapacity": 4
        }
  auth: inherit

runtime:
  variables:
